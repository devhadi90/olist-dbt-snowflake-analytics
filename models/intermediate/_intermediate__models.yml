version: 2

models:

  - name: int_orders__enriched
    description: >
      Orders enriched with aggregated payment totals and review scores.
      Ephemeral — not persisted in Snowflake, consumed only by marts.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: total_order_value
        tests: [not_null]

  - name: int_order_items__with_products
    description: >
      Order items joined with product and seller details.
      Ephemeral — consumed by fct_orders and fct_revenue_by_seller.
    columns:
      - name: order_item_sk
        tests: [unique, not_null]
