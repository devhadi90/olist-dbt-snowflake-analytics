name: CD - Staging

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'tests/**'
      - 'macros/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ---------------------------------------------------------------------------
  # Automated SemVer tag based on conventional commits
  # ---------------------------------------------------------------------------
  tag:
    name: SemVer Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version and push tag
        id: tag
        run: |
          # Get latest tag, default to v0.0.0
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST=${LATEST:-v0.0.0}

          # Parse major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"

          # Determine bump from commit messages since last tag
          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE 'BREAKING CHANGE|^[a-z]+(\(.+\))?!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "Previous: ${LATEST} → New: ${NEW_TAG}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

  # ---------------------------------------------------------------------------
  # Deploy to staging Snowflake schemas
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: tag
    environment: staging

    env:
      DBT_PROFILES_DIR: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Write profiles.yml
        run: |
          cat > profiles.yml << EOF
          olist:
            target: staging
            outputs:
              staging:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_CI_USER }}
                private_key_path: /tmp/snowflake_key.p8
                role: transformer
                warehouse: olist_transform_wh
                database: olist_analytics
                schema: staging_deploy
                threads: 4
                query_tag: dbt_staging_${{ needs.tag.outputs.new_tag }}
          EOF

      - name: Write Snowflake private key
        run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8

      - name: Install dbt packages
        run: dbt deps

      - name: dbt build (full staging run)
        run: dbt build --target staging

      - name: Generate dbt docs
        run: dbt docs generate --target staging

      - name: Upload docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs-${{ needs.tag.outputs.new_tag }}
          path: |
            target/manifest.json
            target/catalog.json
            target/index.html
          retention-days: 30

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target
          publish_branch: gh-pages

      - name: Notify success
        if: success()
        run: echo "✅ Staging deploy complete — version ${{ needs.tag.outputs.new_tag }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Staging deploy failed — version ${{ needs.tag.outputs.new_tag }}"
