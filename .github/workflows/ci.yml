name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'models/**'
      - 'tests/**'
      - 'macros/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - '.sqlfluff'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: SQL Linting — fast fail before any Snowflake cost
  # ---------------------------------------------------------------------------
  lint:
    name: SQLFluff Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install linting dependencies
        run: pip install sqlfluff sqlfluff-templater-dbt dbt-snowflake

      - name: Run SQLFluff
        run: sqlfluff lint models/ --dialect snowflake --templater dbt

  # ---------------------------------------------------------------------------
  # Job 2: dbt slim CI — only builds models changed in this PR
  # ---------------------------------------------------------------------------
  dbt-ci:
    name: dbt Build (Slim CI)
    runs-on: ubuntu-latest
    needs: lint          # don't spend Snowflake credits if SQL has lint errors
    environment: ci

    env:
      DBT_PROFILES_DIR: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Write profiles.yml from secrets
        run: |
          cat > profiles.yml << EOF
          olist:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_CI_USER }}
                private_key_path: /tmp/snowflake_key.p8
                role: transformer
                warehouse: olist_transform_wh
                database: olist_analytics
                schema: ci
                threads: 4
                query_tag: dbt_ci_pr_${{ github.event.pull_request.number }}
          EOF

      - name: Write Snowflake private key
        run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8

      - name: Install dbt packages
        run: dbt deps

      # Download the latest prod manifest to enable slim CI (state:modified+)
      # Falls back to full run if no manifest exists yet (first-ever CI run)
      - name: Download prod manifest
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: prod-manifest
          path: target/

      - name: dbt build (modified models only)
        run: |
          if [ -f target/manifest.json ]; then
            echo "Manifest found — running slim CI"
            dbt build \
              --target ci \
              --select state:modified+ \
              --defer \
              --state target/
          else
            echo "No manifest — running full build (first run)"
            dbt build --target ci
          fi

      - name: dbt docs compile (check docs generation works)
        run: dbt docs generate --target ci

      - name: Cleanup CI schema
        if: always()
        run: |
          dbt run-operation drop_schema \
            --args '{"schema_name": "ci"}' \
            --target ci
        continue-on-error: true
